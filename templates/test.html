<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEC-RAS 3D 智能管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/test.css?v=20260403f">
</head>
<body class="h-screen flex flex-col">

    <header class="glass-header py-6 px-8 border-b border-gray-800">
        <div class="max-w-full mx-auto grid grid-cols-3 items-center">
            
            <div class="flex flex-col">
                <h1 class="text-xl font-bold tracking-tight">HEC-RAS <span class="text-blue-500">3D</span></h1>
                <p class="text-gray-500 text-[10px] font-mono leading-tight">INTELLIGENT ANALYSIS</p>
            </div>

            <div class="relative w-full max-w-xl mx-auto">
                <input type="text" 
                       placeholder="🤖 尝试搜索项目或让 AI 分析 HDF 数据..." 
                       class="w-full bg-[#0d1117] border border-gray-700 rounded-full py-2.5 px-6 text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-600 focus:border-transparent shadow-lg">
                <button class="absolute right-2 top-1.5 bg-blue-600 hover:bg-blue-500 text-white text-[11px] px-4 py-1.5 rounded-full transition-colors">
                    AI 检索
                </button>
            </div>

            <div></div>
            
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <section class="w-[40%] flex flex-col p-6 overflow-y-auto divider">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-semibold flex items-center">
                    <span class="w-1 h-5 bg-blue-500 mr-2 rounded-full"></span>项目库
                </h2>
                
                <div class="flex items-center space-x-2">
                    <a href="/stress-test" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-3 py-1.5 rounded flex items-center gap-1 transition-all">
                        散点压测
                    </a>
                    <button id="btn-new-project" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1.5 rounded flex items-center gap-1 transition-all">
                        新建项目
                    </button>
                </div>
            </div>

            <div id="projectCardList" class="space-y-4"></div>
        </section>

        <section class="w-[60%] flex flex-col overflow-hidden">
            
            <div class="h-[36%] section-divider hydro-panel p-4">
                <div class="hydro-overview-head mb-3">
                    <div class="hydro-ai-inline">
                        <button id="label-ai-trigger" class="label-ai-trigger" type="button" aria-label="AI概括">
                            <span class="label-ai-trigger__text">AI总结</span>
                        </button>

                        <div id="hydroAiInsightBubble" class="hydro-ai-bubble">
                            <p id="hydroAiInsightText" class="hydro-ai-bubble__text">点击 AI总结 获取右侧评价</p>
                        </div>
                    </div>

                    <div class="flex gap-4 text-[10px] text-gray-400">
                        <div class="flex items-center gap-1.5"><span class="w-2 h-2 bg-cyan-400 rounded-full"></span><span>末时刻栅格</span></div>
                        <div class="flex items-center gap-1.5"><span class="w-2 h-2 bg-emerald-400 rounded-full"></span><span>边界入流曲线</span></div>
                        <div class="flex items-center gap-1.5"><span class="w-2 h-2 bg-indigo-300 rounded-full"></span><span>流速分布</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-6 gap-2 mb-3 text-[10px] hydro-stats-grid">
                    <div class="stats-pill">
                        <span class="stats-pill__label">淹没点</span>
                        <strong id="statsPointCount" class="stats-pill__value">-</strong>
                    </div>
                    <div class="stats-pill">
                        <span class="stats-pill__label">平均水深</span>
                        <strong id="statsAvgDepth" class="stats-pill__value">-</strong>
                    </div>
                    <div class="stats-pill">
                        <span class="stats-pill__label">最大水深</span>
                        <strong id="statsMaxDepth" class="stats-pill__value">-</strong>
                    </div>
                    <div class="stats-pill">
                        <span class="stats-pill__label">估算面积</span>
                        <strong id="statsFloodArea" class="stats-pill__value">-</strong>
                    </div>
                    <div class="stats-pill">
                        <span class="stats-pill__label">峰值入流</span>
                        <strong id="statsFlowPeak" class="stats-pill__value">-</strong>
                    </div>
                    <div class="stats-pill">
                        <span class="stats-pill__label">当前入流</span>
                        <strong id="statsFlowCurrent" class="stats-pill__value">-</strong>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3 h-[152px] min-h-0 hydro-charts-grid">
                    <article class="chart-shell">
                        <header class="chart-shell__title">水深分布</header>
                        <div id="depthDistributionChart" class="chart-shell__body"></div>
                    </article>
                    <article class="chart-shell">
                        <header class="chart-shell__title">上游非恒定流</header>
                        <div id="flowHydrographChart" class="chart-shell__body"></div>
                    </article>
                    <article class="chart-shell">
                        <header class="chart-shell__title">面流速分布</header>
                        <div id="velocityHistogramChart" class="chart-shell__body"></div>
                    </article>
                </div>
            </div>

            <div class="h-[64%] earth-container relative" id="cesiumContainer">
            </div>

        </section>

    </main>

    <div id="deleteProjectModalRoot"></div>

</body>
<script src="/assets/js/project-cards.js?v=20260403f"></script>
<script src="/assets/js/new-project.js?v=20260403f"></script>
<script src="/assets/vendor/echarts.min.js"></script>
<script src="/assets/js/test.js?v=20260403f"></script>
</html>

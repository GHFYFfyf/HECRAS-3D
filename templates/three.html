<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEC-RAS 3D 场景</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap");

        :root {
            --ui-bg: rgba(8, 13, 24, 0.76);
            --ui-border: rgba(145, 176, 255, 0.28);
            --ui-text: #f2f6ff;
            --ui-muted: #9aafde;
            --ui-accent: #8ddcff;
            --ui-accent-soft: rgba(141, 220, 255, 0.18);
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 16%, rgba(75, 132, 255, 0.22) 0%, rgba(75, 132, 255, 0) 42%),
                radial-gradient(circle at 84% 22%, rgba(86, 197, 255, 0.2) 0%, rgba(86, 197, 255, 0) 38%),
                linear-gradient(180deg, #030712 0%, #020409 100%);
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ui-text);
        }

        #threeRoot {
            width: 100vw;
            height: 100vh;
        }

        .scene-ui {
            position: fixed;
            inset: 0;
            z-index: 30;
            pointer-events: none;
        }

        .scene-topbar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand-card {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--ui-border);
            background: var(--ui-bg);
            backdrop-filter: blur(16px);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--ui-accent);
            box-shadow: 0 0 14px rgba(141, 220, 255, 0.7);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .brand-text strong {
            font-size: 14px;
            letter-spacing: 0.03em;
            font-weight: 700;
        }

        .brand-text span {
            font-size: 11px;
            color: var(--ui-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .project-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--ui-border);
            background: rgba(7, 12, 22, 0.78);
            color: #d6e5ff;
            font-size: 12px;
            letter-spacing: 0.04em;
            backdrop-filter: blur(10px);
        }

        .scene-side {
            position: absolute;
            left: 16px;
            bottom: 16px;
            width: min(300px, calc(100vw - 32px));
            border-radius: 14px;
            border: 1px solid var(--ui-border);
            background: var(--ui-bg);
            backdrop-filter: blur(14px);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.38);
            overflow: hidden;
            pointer-events: auto;
        }

        .scene-side__head {
            padding: 12px 14px 10px;
            border-bottom: 1px solid rgba(145, 176, 255, 0.2);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ui-muted);
        }

        .scene-side__body {
            padding: 12px 14px;
            display: grid;
            gap: 10px;
            font-size: 12px;
            color: #dbe7ff;
            line-height: 1.6;
        }

        .scene-side__row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .scene-side__row span {
            color: var(--ui-muted);
            letter-spacing: 0.04em;
        }

        .scene-side__row strong {
            font-weight: 600;
            color: #eef5ff;
        }

        #perfHud {
            position: fixed;
            top: 16px;
            right: 16px;
            min-width: 170px;
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            color: #e3edff;
            font: 12px/1.55 "Space Grotesk", "Menlo", monospace;
            letter-spacing: 0.25px;
            pointer-events: none;
            z-index: 20;
            backdrop-filter: blur(16px);
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.36);
        }

        #perfHud .label {
            color: var(--ui-muted);
            margin-right: 6px;
        }

        #hdfTimelineRoot {
            top: auto !important;
            left: 50% !important;
            right: auto !important;
            bottom: 16px !important;
            transform: translateX(-50%) !important;
            width: min(720px, calc(100vw - 350px)) !important;
            max-width: calc(100vw - 32px) !important;
            padding: 12px 14px !important;
            border-radius: 14px !important;
            background: var(--ui-bg) !important;
            border: 1px solid var(--ui-border) !important;
            color: #e0ebff !important;
            font: 12px/1.5 "Space Grotesk", "Menlo", monospace !important;
            backdrop-filter: blur(16px);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
        }

        #hdfTimelineRoot input[type="range"] {
            accent-color: #9dd8ff;
        }

        @media (max-width: 1024px) {
            #hdfTimelineRoot {
                width: min(720px, calc(100vw - 32px)) !important;
            }
        }

        @media (max-width: 768px) {
            .scene-topbar {
                flex-wrap: wrap;
            }

            #perfHud {
                top: auto;
                right: 12px;
                bottom: 164px;
                min-width: 150px;
                padding: 10px 12px;
            }

            .scene-side {
                width: calc(100vw - 24px);
                left: 12px;
                right: 12px;
                bottom: 84px;
            }

            #hdfTimelineRoot {
                bottom: 12px !important;
                width: calc(100vw - 24px) !important;
                padding: 10px 12px !important;
            }
        }
    </style>
</head>
<body>
    <div id="threeRoot"></div>
    <div class="scene-ui">
        <div class="scene-topbar">
            <div class="brand-card">
                <span class="brand-dot" aria-hidden="true"></span>
                <div class="brand-text">
                    <strong>HEC-RAS 3D</strong>
                    <span>Project Viewport</span>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <div class="project-chip" id="projectChip">项目 ID: --</div>
                <div class="project-chip" style="pointer-events: auto; padding: 4px; display: flex; gap: 4px;">
                    <span style="padding: 0 8px; color: var(--ui-muted); align-self: center;">传输模式:</span>
                    <button class="mode-btn" data-mode="single-json" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">单包 JSON</button>
                    <button class="mode-btn" data-mode="tile-json" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">分块 JSON</button>
                    <button class="mode-btn" data-mode="tile-binary" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">分块 Binary</button>
                </div>
                <div class="project-chip" style="pointer-events: auto; padding: 4px; display: flex; gap: 4px;">
                    <span style="padding: 0 8px; color: var(--ui-muted); align-self: center;">Stride:</span>
                    <button class="stride-btn" data-stride="auto" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">Auto</button>
                    <button class="stride-btn" data-stride="1" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">1</button>
                    <button class="stride-btn" data-stride="4" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">4</button>
                </div>
                <div class="project-chip" style="pointer-events: auto; padding: 4px; display: flex; gap: 4px;">
                    <span style="padding: 0 8px; color: var(--ui-muted); align-self: center;">无效顶点:</span>
                    <button class="invalid-btn" data-invalid="1" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">开</button>
                    <button class="invalid-btn" data-invalid="0" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">关</button>
                </div>
                <div class="project-chip" style="pointer-events: auto; padding: 4px; display: flex; gap: 4px;">
                    <span style="padding: 0 8px; color: var(--ui-muted); align-self: center;">HDF缓存:</span>
                    <button class="cache-btn" data-cache="warm" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">热启动</button>
                    <button class="cache-btn" data-cache="cold" style="background: transparent; border: 1px solid var(--ui-border); color: var(--ui-muted); padding: 4px 8px; border-radius: 999px; cursor: pointer;">冷启动</button>
                </div>
            </div>
        </div>

        <aside class="scene-side" aria-label="性能拆解">
            <div class="scene-side__head">性能拆解</div>
            <div class="scene-side__body">
                <div class="scene-side__row"><span>数据生成(后端)</span><strong id="perfDataGen">--</strong></div>
                <div class="scene-side__row"><span>后端传输</span><strong id="perfBackendTransfer">--</strong></div>
                <div class="scene-side__row"><span>前端拉取</span><strong id="perfFrontendFetch">--</strong></div>
                <div class="scene-side__row"><span>前端解析</span><strong id="perfFrontendParse">--</strong></div>
                <div class="scene-side__row"><span>前端渲染</span><strong id="perfFrontendRender">--</strong></div>
                <div class="scene-side__row"><span>首帧可交互</span><strong id="perfTTI">--</strong></div>
                <div class="scene-side__row"><span>TTI-页面初始化</span><strong id="perfTTIInit">--</strong></div>
                <div class="scene-side__row"><span>TTI-项目解析</span><strong id="perfTTIProject">--</strong></div>
                <div class="scene-side__row"><span>TTI-元数据</span><strong id="perfTTIMeta">--</strong></div>
                <div class="scene-side__row"><span>TTI-首批瓦片</span><strong id="perfTTITiles">--</strong></div>
                <div class="scene-side__row"><span>TTI-首帧重建</span><strong id="perfTTIRebuild">--</strong></div>
                <div class="scene-side__row"><span>实时 FPS</span><strong id="perfRealtimeFps">--</strong></div>
                <div class="scene-side__row"><span>Draw Calls</span><strong id="perfDrawCalls">--</strong></div>
                <div class="scene-side__row"><span>Triangles</span><strong id="perfTriangles">--</strong></div>
                <div class="scene-side__row"><span>最近阶段</span><strong id="perfStage">--</strong></div>
                <div class="scene-side__row">
                    <span>结果写入</span>
                    <button id="writeXnBtn" type="button" style="font:11px/1.2 Menlo,Consolas,monospace;padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.24);background:transparent;color:#dbe5ff;cursor:pointer;">写入 xn.xlsx</button>
                </div>
                <div class="scene-side__row"><span>写入状态</span><strong id="writeXnStatus">--</strong></div>
            </div>
        </aside>
    </div>

    <div id="perfHud">
        <div><span class="label">Load</span><span id="hudLoad">-- ms</span></div>
        <div><span class="label">FPS</span><span id="hudFps">--</span></div>
        <div><span class="label">Tiles</span><span id="hudTileCount">--</span></div>
        <div><span class="label">TilePts</span><span id="hudTilePoints">--</span></div>
        <div><span class="label">Visible</span><span id="hudVisibleTiles">--</span></div>
        <div><span class="label">Loaded</span><span id="hudLoadedTiles">--</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/assets/js/three-empty.js?v=20260329-colorfix-v1"></script>
    <script src="/assets/js/three-hdf-overlay.js?v=20260329-hdf-on-v1"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const chip = document.getElementById("projectChip");
            if (chip) {
                const projectId = params.get("project_id") || "--";
                chip.textContent = `项目 ID: ${projectId}`;
            }
            
            // Handle transport mode selector
            const currentMode = (params.get("tile_transport") || "tile-binary").toLowerCase();
            const modeBtns = document.querySelectorAll(".mode-btn");
            modeBtns.forEach(btn => {
                if (btn.dataset.mode === currentMode) {
                    btn.style.background = "var(--ui-accent-soft)";
                    btn.style.color = "var(--ui-accent)";
                    btn.style.borderColor = "var(--ui-accent)";
                }
                btn.addEventListener("click", () => {
                    const newParams = new URLSearchParams(window.location.search);
                    newParams.set("tile_transport", btn.dataset.mode);
                    window.location.search = newParams.toString();
                });
            });

            // Handle stride selector
            const currentStride = (params.get("fixed_stride") || "auto").toLowerCase();
            const strideBtns = document.querySelectorAll(".stride-btn");
            strideBtns.forEach(btn => {
                if (btn.dataset.stride === currentStride) {
                    btn.style.background = "var(--ui-accent-soft)";
                    btn.style.color = "var(--ui-accent)";
                    btn.style.borderColor = "var(--ui-accent)";
                }
                btn.addEventListener("click", () => {
                    const newParams = new URLSearchParams(window.location.search);
                    if (btn.dataset.stride === "auto") {
                        newParams.delete("fixed_stride");
                    } else {
                        newParams.set("fixed_stride", btn.dataset.stride);
                    }
                    window.location.search = newParams.toString();
                });
            });

            const currentInvalid = (params.get("include_invalid_vertices") || "1").toLowerCase();
            const invalidBtns = document.querySelectorAll(".invalid-btn");
            invalidBtns.forEach(btn => {
                if (btn.dataset.invalid === currentInvalid) {
                    btn.style.background = "var(--ui-accent-soft)";
                    btn.style.color = "var(--ui-accent)";
                    btn.style.borderColor = "var(--ui-accent)";
                }
                btn.addEventListener("click", () => {
                    const newParams = new URLSearchParams(window.location.search);
                    newParams.set("include_invalid_vertices", btn.dataset.invalid);
                    window.location.search = newParams.toString();
                });
            });

            const currentCache = (params.get("hdf_cache_mode") || "warm").toLowerCase();
            const cacheBtns = document.querySelectorAll(".cache-btn");
            cacheBtns.forEach(btn => {
                if (btn.dataset.cache === currentCache) {
                    btn.style.background = "var(--ui-accent-soft)";
                    btn.style.color = "var(--ui-accent)";
                    btn.style.borderColor = "var(--ui-accent)";
                }
                btn.addEventListener("click", () => {
                    const newParams = new URLSearchParams(window.location.search);
                    newParams.set("hdf_cache_mode", btn.dataset.cache);
                    window.location.search = newParams.toString();
                });
            });
        })();
    </script>
</body>
</html>

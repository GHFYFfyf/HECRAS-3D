<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Empty Scene</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #05070d;
        }

        #threeRoot {
            width: 100vw;
            height: 100vh;
        }

        #perfHud {
            position: fixed;
            top: 12px;
            right: 12px;
            min-width: 140px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(7, 10, 18, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: #dbe5ff;
            font: 12px/1.5 "Menlo", "Consolas", monospace;
            letter-spacing: 0.2px;
            pointer-events: none;
            z-index: 20;
        }

        #perfHud .label {
            color: #95a4cc;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div id="threeRoot"></div>
    <div id="perfHud">
        <div><span class="label">Load</span><span id="hudLoad">-- ms</span></div>
        <div><span class="label">FPS</span><span id="hudFps">--</span></div>
        <div><span class="label">Tiles</span><span id="hudTileCount">--</span></div>
        <div><span class="label">TilePts</span><span id="hudTilePoints">--</span></div>
        <div><span class="label">Visible</span><span id="hudVisibleTiles">--</span></div>
        <div><span class="label">Loaded</span><span id="hudLoadedTiles">--</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/assets/js/three-empty.js?v=20260317-tiledebug"></script>
    <script src="/assets/js/three-hdf-overlay.js?v=20260317-tiledebug"></script>
</body>
</html>
